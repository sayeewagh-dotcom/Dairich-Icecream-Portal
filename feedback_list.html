<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Feedback — Dairich Distributor Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dist-portal.css">
</head>
<body>

<nav class="portal-bar">
  <a href="profile.html" class="pbar-logo">Dairich <span>Distributor Portal</span></a>
  <ul class="pbar-nav">
    <li><a href="profile.html">Dashboard</a></li>
    <li><a href="place.html">Place Order</a></li>
    <li><a href="orders_list.html">My Orders</a></li>
    <li><a href="feedback_list.html" class="active">Feedback</a></li>
  </ul>
  <div class="pbar-right">
    <div class="pbar-user"><div class="pbar-avatar" id="avatarInitial">D</div><span id="companyName">…</span></div>
    <a href="#" class="pbar-logout" id="logoutBtn">Logout</a>
  </div>
</nav>

<div class="portal-page">
  <div class="dash-wrap">

    <div class="page-hdr">
      <p class="page-hdr-tag">Review History</p>
      <h1 class="page-hdr-title">My <span>Feedback</span></h1>
    </div>

    <div id="feedbackContent">
      <div style="text-align:center;padding:48px;color:var(--muted);">Loading feedback…</div>
    </div>

  </div>
</div>

<footer class="portal-footer">
  <div class="portal-footer-logo">Dairich</div>
  <div class="portal-footer-copy">© 2024 Dairich Ice Cream. All Rights Reserved.</div>
</footer>

<script>
  const token   = localStorage.getItem('dairich_token');
  const company = localStorage.getItem('dairich_company') || 'Distributor';
  if (!token) window.location.href = 'login.html';
  document.getElementById('companyName').textContent   = company;
  document.getElementById('avatarInitial').textContent = company.charAt(0).toUpperCase();

  function stars(n) {
    return Array.from({length:5}, (_,i) => `<span style="font-size:18px;opacity:${i<n?1:0.2};">⭐</span>`).join('');
  }

  async function loadFeedback() {
    try {
      const res  = await fetch('api/feedback/feedbacklist.php', { headers:{'Authorization':'Bearer '+token} });
      const data = await res.json();
      const list = data.feedback || [];

      if (!list.length) {
        document.getElementById('feedbackContent').innerHTML = `
          <div class="section-card" style="text-align:center;padding:48px;">
            <div style="font-size:48px;margin-bottom:16px;">💬</div>
            <div style="font-size:18px;font-weight:700;color:var(--dark);margin-bottom:8px;">No feedback yet</div>
            <p style="color:var(--muted);font-size:14px;margin-bottom:24px;">Once your orders are delivered, you can leave feedback here.</p>
            <a href="orders_list.html" class="btn-secondary">View My Orders</a>
          </div>`;
        return;
      }

      document.getElementById('feedbackContent').innerHTML = `
        <div style="display:grid;gap:20px;">
          ${list.map(f=>`
            <div class="section-card reveal" style="display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;">
              <div>
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
                  <a href="detail.html?order_id=${f.order_id}" style="font-size:15px;font-weight:700;color:var(--red);text-decoration:none;">Order #${f.order_id}</a>
                  <span style="font-size:12px;color:var(--muted);">${new Date(f.submitted_at).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</span>
                </div>
                <div style="margin-bottom:10px;">${stars(f.rating)}</div>
                ${f.message?`<p style="font-size:14px;color:#555;line-height:1.6;">"${f.message}"</p>`:'<p style="font-size:13px;color:var(--muted);font-style:italic;">No message left.</p>'}
              </div>
              <div style="text-align:right;">
                <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--dark);">${f.rating}<span style="font-size:14px;color:var(--muted)">/5</span></div>
                <div style="font-size:12px;color:var(--muted);">₹${parseFloat(f.total_amount||0).toLocaleString('en-IN')}</div>
              </div>
            </div>`).join('')}
        </div>`;

      const ro = new IntersectionObserver(entries => entries.forEach(e => { if(e.isIntersecting){e.target.classList.add('vis');ro.unobserve(e.target);} }), {threshold:0.1});
      document.querySelectorAll('.reveal').forEach(el => ro.observe(el));

    } catch {
      document.getElementById('feedbackContent').innerHTML = '<div class="alert alert-err">Could not load feedback.</div>';
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', e => {
    e.preventDefault();
    fetch('api/distributor/logout.php', { method:'POST', headers:{'Authorization':'Bearer '+token} });
    localStorage.clear(); window.location.href = 'login.html';
  });

  loadFeedback();
</script>
</body>
</html>
