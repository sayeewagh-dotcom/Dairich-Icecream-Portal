<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — Dairich Distributor Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dist-portal.css">
</head>
<body>

<nav class="portal-bar">
  <a href="profile.html" class="pbar-logo">Dairich <span>Distributor Portal</span></a>
  <ul class="pbar-nav">
    <li><a href="profile.html">Dashboard</a></li>
    <li><a href="place.html">Place Order</a></li>
    <li><a href="orders_list.html" class="active">My Orders</a></li>
    <li><a href="feedback_list.html">Feedback</a></li>
  </ul>
  <div class="pbar-right">
    <div class="pbar-user"><div class="pbar-avatar" id="avatarInitial">D</div><span id="companyName">…</span></div>
    <a href="#" class="pbar-logout" id="logoutBtn">Logout</a>
  </div>
</nav>

<div class="portal-page">
  <div class="dash-wrap">

    <div class="page-hdr" style="display:flex;justify-content:space-between;align-items:flex-end;">
      <div>
        <p class="page-hdr-tag">Order History</p>
        <h1 class="page-hdr-title">My <span>Orders</span></h1>
      </div>
      <a href="place.html" class="btn-yellow-sm" style="margin-bottom:8px;">+ New Order</a>
    </div>

    <!-- Filter pills -->
    <div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;">
      <button class="flav-btn on" onclick="filterOrders('all',this)">All</button>
      <button class="flav-btn" onclick="filterOrders('pending',this)">Pending</button>
      <button class="flav-btn" onclick="filterOrders('confirmed',this)">Confirmed</button>
      <button class="flav-btn" onclick="filterOrders('dispatched',this)">Dispatched</button>
      <button class="flav-btn" onclick="filterOrders('delivered',this)">Delivered</button>
      <button class="flav-btn" onclick="filterOrders('cancelled',this)">Cancelled</button>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Order #</th>
            <th>Date</th>
            <th>Items</th>
            <th>Total</th>
            <th>Order Status</th>
            <th>Delivery</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr><td colspan="7" style="text-align:center;color:var(--muted);padding:32px;">Loading orders…</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<footer class="portal-footer">
  <div class="portal-footer-logo">Dairich</div>
  <div class="portal-footer-copy">© 2024 Dairich Ice Cream. All Rights Reserved.</div>
</footer>

<script>
  const token   = localStorage.getItem('dairich_token');
  const company = localStorage.getItem('dairich_company') || 'Distributor';
  if (!token) window.location.href = 'login.html';
  document.getElementById('companyName').textContent   = company;
  document.getElementById('avatarInitial').textContent = company.charAt(0).toUpperCase();

  let allOrders = [];

  function pill(status) {
    const map = { pending:'pill-pending', confirmed:'pill-confirmed', dispatched:'pill-dispatched', delivered:'pill-delivered', cancelled:'pill-cancelled' };
    return `<span class="pill ${map[status]||'pill-pending'}">${status||'—'}</span>`;
  }

  function renderOrders(orders) {
    const tbody = document.getElementById('ordersBody');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:32px;">No orders found.</td></tr>';
      return;
    }
    tbody.innerHTML = orders.map(o => {
      const itemNames = (o.items||[]).map(i=>i.product_name).join(', ') || '—';
      return `<tr>
        <td><strong>#${o.id}</strong></td>
        <td>${new Date(o.order_date).toLocaleDateString('en-IN')}</td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${itemNames}">${itemNames}</td>
        <td>₹${parseFloat(o.total_amount||0).toLocaleString('en-IN')}</td>
        <td>${pill(o.status)}</td>
        <td>${pill(o.delivery_status)}</td>
        <td style="white-space:nowrap;">
          <a href="detail.html?order_id=${o.id}" class="btn-secondary" style="font-size:12px;padding:6px 14px;margin-right:6px;">Detail</a>
          <a href="track.html?order_id=${o.id}" class="btn-yellow-sm" style="font-size:12px;padding:6px 14px;">Track</a>
        </td>
      </tr>`;
    }).join('');
  }

  function filterOrders(status, btn) {
    document.querySelectorAll('.flav-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    const filtered = status === 'all' ? allOrders : allOrders.filter(o => o.status === status || o.delivery_status === status);
    renderOrders(filtered);
  }

  async function loadOrders() {
    try {
      const res  = await fetch('api/orders/orderslist.php', { headers:{'Authorization':'Bearer '+token} });
      const data = await res.json();
      allOrders = data.orders || [];
      renderOrders(allOrders);
    } catch {
      document.getElementById('ordersBody').innerHTML = '<tr><td colspan="7" style="text-align:center;" class="alert alert-err">Could not load orders.</td></tr>';
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', e => {
    e.preventDefault();
    fetch('api/distributor/logout.php', { method:'POST', headers:{'Authorization':'Bearer '+token} });
    localStorage.clear(); window.location.href = 'login.html';
  });

  loadOrders();
</script>
</body>
</html>
